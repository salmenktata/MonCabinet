name: RAG E2E Tests — Smoke (post-deploy)

on:
  # Exécuter après chaque déploiement réussi (mode smoke : groupes 1-6 seulement)
  workflow_run:
    workflows: ["Deploy to VPS Contabo"]
    types:
      - completed
    branches: [main]

  # Permettre exécution manuelle
  workflow_dispatch:

jobs:
  test-production-config:
    name: Test RAG Configuration — Smoke (Production)
    runs-on: ubuntu-latest

    # Exécuter seulement si déploiement a réussi (ou si manuel)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deployment to stabilize
        if: github.event_name == 'workflow_run'
        run: sleep 60  # Attendre 60s après déploiement

      - name: Reset E2E test account quota
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key && chmod 600 /tmp/vps_key
          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "docker exec qadhya-postgres psql -U moncabinet -d qadhya -c \
            \"UPDATE feature_flags SET monthly_ai_queries_used = 0 WHERE user_id = (SELECT id FROM users WHERE email = 'e2e-test@qadhya.tn');\""
          rm -f /tmp/vps_key

      - name: Reset Groq circuit breaker (évite faux positifs dus à trafic prod)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key && chmod 600 /tmp/vps_key
          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "docker exec qadhya-redis redis-cli DEL circuit:state:groq circuit:state:gemini ratelimit:gemini:rpm:$(date +%s | python3 -c 'import sys; print(int(sys.stdin.read().strip())//60)') 2>/dev/null || true"
          rm -f /tmp/vps_key

      - name: Run E2E Tests - Smoke (groupes 1-6, ~20 appels LLM)
        env:
          PLAYWRIGHT_BASE_URL: https://qadhya.tn
          TEST_PROD_URL: https://qadhya.tn
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          E2E_MODE: smoke
        run: npm run test:e2e:rag

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: RAG E2E Tests (Smoke)
          path: 'test-results/*.xml'
          reporter: jest-junit
          fail-on-error: true
          fail-on-empty: false

  alert-on-failure:
    name: Alert if Tests Fail
    runs-on: ubuntu-latest
    needs: test-production-config
    if: failure()

    steps:
      - name: Send alert notification
        run: |
          echo "❌ RAG E2E Smoke Tests FAILED"
          echo "Action requise : Vérifier configuration production"
          echo "Dashboard : https://qadhya.tn/super-admin/monitoring?tab=system-config"
