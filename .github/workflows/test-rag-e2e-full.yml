name: RAG E2E Tests — Complets (hebdomadaire)

on:
  # Tests complets une fois par semaine (dimanche 9h UTC)
  schedule:
    - cron: '0 9 * * 0'

  # Permettre exécution manuelle (ex: avant release importante)
  workflow_dispatch:

jobs:
  test-production-full:
    name: Test RAG Configuration — Complet (Production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Reset E2E test account quota
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key && chmod 600 /tmp/vps_key
          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "docker exec qadhya-postgres psql -U moncabinet -d qadhya -c \
            \"UPDATE feature_flags SET monthly_ai_queries_used = 0 WHERE user_id = (SELECT id FROM users WHERE email = 'e2e-test@qadhya.tn');\""
          rm -f /tmp/vps_key

      - name: Run E2E Tests — Complets (tous les groupes, ~38 appels LLM)
        env:
          PLAYWRIGHT_BASE_URL: https://qadhya.tn
          TEST_PROD_URL: https://qadhya.tn
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          # E2E_MODE absent → mode complet (groupes 1-8)
        run: npm run test:e2e:rag

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: RAG E2E Tests (Complets)
          path: 'test-results/*.xml'
          reporter: jest-junit
          fail-on-error: true
          fail-on-empty: false

  alert-on-failure:
    name: Alert if Tests Fail
    runs-on: ubuntu-latest
    needs: test-production-full
    if: failure()

    steps:
      - name: Send alert notification
        run: |
          echo "❌ RAG E2E Tests Complets FAILED"
          echo "Action requise : Vérifier qualité rédactionnelle et intent routing"
          echo "Dashboard : https://qadhya.tn/super-admin/monitoring?tab=system-config"
